site_name: MCP Database Server for AI Agents
site_description: Controlled database access for AI agents through MCP tools

theme:
  name: material
  language: en
  icon:
    logo: material/database
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light theme
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark theme
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Roadmap:
      - 1 – FastMCP over HTTP: roadmap/01-fastmcp.md
      - 2 – Repository pattern: roadmap/02-repository-pattern.md
      - 3 – Keycloak & scopes: roadmap/03-keycloak-scopes.md
      - 4 – Auditing: roadmap/04-auditing.md
  - Implementation:
      - Overview: implementation/index.md
      - Repository & first tool: implementation/repository.md
      - Keycloak & scopes: implementation/keycloak.md
      - Auditing: implementation/auditing.md
  - Topics:
      - Security & access control: topics/security-access-control.md
      - Auditability & compliance: topics/audit-compliance.md
      - Database architecture: topics/database-architecture.md
      - Infrastructure & operations: topics/infrastructure-operations.md
      - Agent lifecycle: topics/agent-lifecycle.md
